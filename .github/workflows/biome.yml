name: Biome

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  biome:
    name: biome ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run ci
