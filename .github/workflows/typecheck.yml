name: Typecheck

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit --ignoreDeprecations 6.0
